<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NowFlow - Interstitial Journal</title>
    <meta name="theme-color" content="#1e1e2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script>
        const manifest = {
            "name": "NowFlow",
            "short_name": "NowFlow",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#1e1e2e",
            "theme_color": "#1e1e2e",
            "description": "Minimal interstitial journaling for ADHD focus.",
            "icons": [{
                "src": "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2389b4fa'/><circle cx='50' cy='50' r='20' fill='%231e1e2e'/></svg>",
                "sizes": "192x192",
                "type": "image/svg+xml"
            }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
        const manifestUrl = URL.createObjectURL(manifestBlob);
        document.write(`<link rel="manifest" href="${manifestUrl}">`);
    </script>

    <style>
        /* CSS Reset & Variables (Catppuccin Macchiato inspired - calming, low contrast) */
        :root {
            --bg: #1e1e2e;
            --surface: #313244;
            --surface-hover: #45475a;
            --text: #cdd6f4;
            --subtext: #a6adc8;
            --primary: #89b4fa;
            --primary-hover: #b4befe;
            --success: #a6e3a1;
            --danger: #f38ba8;
            --font: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --radius: 16px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Layout */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-top: env(safe-area-inset-top); /* iOS Safe Area */
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--subtext);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: color var(--transition), background var(--transition);
        }
        .icon-btn:hover {
            color: var(--text);
            background: var(--surface);
        }

        /* Views */
        .view {
            display: none;
            flex-direction: column;
            flex-grow: 1;
            animation: fadeIn 0.4s ease forwards;
        }
        .view.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        h2 {
            font-size: 1.25rem;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .help-text {
            color: var(--subtext);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        /* Forms & Inputs */
        input[type="text"], textarea {
            width: 100%;
            background: var(--surface);
            border: 2px solid transparent;
            color: var(--text);
            padding: 16px;
            border-radius: var(--radius);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color var(--transition);
            margin-bottom: 16px;
        }
        input[type="text"]:focus, textarea:focus {
            border-color: var(--primary);
        }
        textarea {
            resize: none;
            min-height: 100px;
        }

        button {
            background: var(--primary);
            color: var(--bg);
            border: none;
            padding: 16px;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform var(--transition), background var(--transition);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        button:active {
            transform: scale(0.98);
        }
        button.success {
            background: var(--success);
        }
        button.secondary {
            background: var(--surface);
            color: var(--text);
            margin-top: 12px;
        }

        /* Active Task UI */
        .sticky-task {
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius);
            border-left: 4px solid var(--primary);
            margin-bottom: 24px;
            position: sticky;
            top: 16px;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .sticky-task .task-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .sticky-task .task-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        /* Journal Feed */
        .journal-feed {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
            flex-grow: 1;
        }
        .journal-entry {
            background: transparent;
            padding: 12px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--surface);
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: fadeIn 0.3s ease;
        }
        .journal-entry .time {
            font-size: 0.75rem;
            color: var(--subtext);
        }
        .journal-entry .text {
            font-size: 0.95rem;
        }

        /* History View */
        .history-card {
            background: var(--surface);
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 16px;
        }
        .history-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .history-card-title {
            font-weight: 600;
        }
        .history-card-time {
            font-size: 0.8rem;
            color: var(--subtext);
        }
        .history-entry {
            font-size: 0.9rem;
            color: var(--subtext);
            padding-left: 12px;
            border-left: 2px solid var(--surface-hover);
            margin-bottom: 8px;
        }

        .empty-state {
            text-align: center;
            color: var(--subtext);
            margin-top: 48px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>NowFlow</h1>
        <button id="nav-btn" class="icon-btn" aria-label="Toggle History">
            <svg id="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
        </button>
    </header>

    <main id="view-start" class="view active">
        <h2>What's your single focus right now?</h2>
        <p class="help-text">Pick one thing. We'll handle the distractions together.</p>
        
        <input type="text" id="task-input" placeholder="e.g., Write the project proposal" autocomplete="off">
        <button id="start-btn">Start Flow</button>
    </main>

    <main id="view-active" class="view">
        <div class="sticky-task">
            <div class="task-label">Current Focus</div>
            <div class="task-title" id="active-task-title">Task Name</div>
        </div>

        <h2>Mind dump</h2>
        <p class="help-text">Got distracted? Feeling anxious? Write it here and get back to the task.</p>
        
        <textarea id="journal-input" placeholder="What's on your mind?"></textarea>
        <button id="log-btn" class="secondary">Log Thought</button>

        <div style="margin-top: 32px;"></div>
        <div class="journal-feed" id="journal-feed">
            </div>

        <button id="complete-btn" class="success">Mark Task Complete</button>
    </main>

    <main id="view-history" class="view">
        <h2>Past Flows</h2>
        <p class="help-text">Review what you accomplished and the thoughts you captured.</p>
        
        <div id="history-feed">
            </div>
    </main>
</div>

<script>
    /**
     * App Logic for NowFlow
     * Minimal Vanilla JS Architecture
     */
    const App = {
        state: {
            activeTask: null, // { id, title, startTime, entries: [] }
            history: [],
            currentView: 'start' // 'start', 'active', 'history'
        },

        // DOM Elements
        els: {
            viewStart: document.getElementById('view-start'),
            viewActive: document.getElementById('view-active'),
            viewHistory: document.getElementById('view-history'),
            
            navBtn: document.getElementById('nav-btn'),
            navIcon: document.getElementById('nav-icon'),
            
            taskInput: document.getElementById('task-input'),
            startBtn: document.getElementById('start-btn'),
            
            activeTaskTitle: document.getElementById('active-task-title'),
            journalInput: document.getElementById('journal-input'),
            logBtn: document.getElementById('log-btn'),
            completeBtn: document.getElementById('complete-btn'),
            journalFeed: document.getElementById('journal-feed'),
            
            historyFeed: document.getElementById('history-feed')
        },

        init() {
            this.loadState();
            this.bindEvents();
            this.evaluateState();
        },

        bindEvents() {
            // Start View
            this.els.startBtn.addEventListener('click', () => this.startTask());
            this.els.taskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') this.startTask();
            });

            // Active View
            this.els.logBtn.addEventListener('click', () => this.logJournalEntry());
            this.els.journalInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    this.logJournalEntry();
                }
            });
            this.els.completeBtn.addEventListener('click', () => this.completeTask());

            // Navigation
            this.els.navBtn.addEventListener('click', () => this.toggleHistory());
        },

        loadState() {
            const saved = localStorage.getItem('nowflow_state');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    this.state.activeTask = parsed.activeTask || null;
                    this.state.history = parsed.history || [];
                } catch (e) {
                    console.error("Failed to parse local storage", e);
                }
            }
        },

        saveState() {
            localStorage.setItem('nowflow_state', JSON.stringify({
                activeTask: this.state.activeTask,
                history: this.state.history
            }));
        },

        evaluateState() {
            if (this.state.activeTask) {
                this.switchView('active');
            } else {
                this.switchView('start');
            }
        },

        switchView(viewName) {
            this.state.currentView = viewName;
            
            // Hide all
            this.els.viewStart.classList.remove('active');
            this.els.viewActive.classList.remove('active');
            this.els.viewHistory.classList.remove('active');

            // Reset icon
            this.els.navIcon.innerHTML = `<line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line>`;

            if (viewName === 'start') {
                this.els.viewStart.classList.add('active');
                this.els.taskInput.focus();
            } else if (viewName === 'active') {
                this.els.viewActive.classList.add('active');
                this.els.activeTaskTitle.textContent = this.state.activeTask.title;
                this.renderJournalFeed();
                // We deliberately do not auto-focus the journal to prevent keyboard popping up unnecessarily on mobile
            } else if (viewName === 'history') {
                this.els.viewHistory.classList.add('active');
                // Change icon to 'Back'
                this.els.navIcon.innerHTML = `<line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>`;
                this.renderHistory();
            }
        },

        toggleHistory() {
            if (this.state.currentView === 'history') {
                this.evaluateState(); // Go back to where we were
            } else {
                this.switchView('history');
            }
        },

        startTask() {
            const title = this.els.taskInput.value.trim();
            if (!title) return;

            this.state.activeTask = {
                id: Date.now().toString(),
                title: title,
                startTime: Date.now(),
                entries: []
            };

            this.els.taskInput.value = '';
            this.saveState();
            this.evaluateState();
        },

        logJournalEntry() {
            const text = this.els.journalInput.value.trim();
            if (!text || !this.state.activeTask) return;

            this.state.activeTask.entries.push({
                time: Date.now(),
                text: text
            });

            this.els.journalInput.value = '';
            this.saveState();
            this.renderJournalFeed();
        },

        completeTask() {
            if (!this.state.activeTask) return;

            this.state.activeTask.endTime = Date.now();
            this.state.history.unshift(this.state.activeTask); // Add to beginning of history
            this.state.activeTask = null;
            
            this.saveState();
            this.evaluateState();
        },

        renderJournalFeed() {
            if (!this.state.activeTask) return;
            
            const entries = this.state.activeTask.entries;
            this.els.journalFeed.innerHTML = '';

            // Render in reverse chronological order
            [...entries].reverse().forEach(entry => {
                const div = document.createElement('div');
                div.className = 'journal-entry';
                div.innerHTML = `
                    <div class="time">${this.formatTime(entry.time)}</div>
                    <div class="text">${this.escapeHTML(entry.text)}</div>
                `;
                this.els.journalFeed.appendChild(div);
            });
        },

        renderHistory() {
            this.els.historyFeed.innerHTML = '';
            
            if (this.state.history.length === 0) {
                this.els.historyFeed.innerHTML = `<div class="empty-state">No past flows yet.</div>`;
                return;
            }

            this.state.history.forEach(task => {
                const card = document.createElement('div');
                card.className = 'history-card';
                
                let entriesHtml = '';
                if (task.entries && task.entries.length > 0) {
                    entriesHtml = task.entries.map(e => `
                        <div class="history-entry">
                            <strong>${this.formatTime(e.time)}:</strong> ${this.escapeHTML(e.text)}
                        </div>
                    `).join('');
                } else {
                    entriesHtml = `<div class="history-entry" style="border-left-color: transparent; opacity: 0.5;">No distractions logged. Great focus!</div>`;
                }

                card.innerHTML = `
                    <div class="history-card-header">
                        <div class="history-card-title">${this.escapeHTML(task.title)}</div>
                        <div class="history-card-time">${this.formatDate(task.startTime)}</div>
                    </div>
                    ${entriesHtml}
                `;
                this.els.historyFeed.appendChild(card);
            });
        },

        formatTime(timestamp) {
            return new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit' }).format(new Date(timestamp));
        },

        formatDate(timestamp) {
            return new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric' }).format(new Date(timestamp));
        },

        escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }
    };

    // Initialize App
    document.addEventListener('DOMContentLoaded', () => {
        App.init();
    });

    /**
     * Inline Service Worker for Offline PWA Support
     * Using a Blob to register a service worker directly from the HTML file.
     */
    const swCode = `
        const CACHE_NAME = 'nowflow-v1';
        self.addEventListener('install', (event) => {
            self.skipWaiting();
        });
        self.addEventListener('activate', (event) => {
            event.waitUntil(clients.claim());
        });
        self.addEventListener('fetch', (event) => {
            event.respondWith(
                fetch(event.request).catch(() => {
                    return new Response(
                        "You are offline. NowFlow works entirely locally, please keep the tab open.", 
                        { status: 503, statusText: 'Service Unavailable' }
                    );
                })
            );
        });
    `;

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            // Note: Blob-based SW scope is restricted, but satisfies the 1-file constraint.
            navigator.serviceWorker.register(swUrl).catch(err => {
                console.log('SW registration fallback (expected for blob URLs in strict browsers)', err);
            });
        });
    }
</script>
</body>
</html>
